<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#36D3C0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- title / description / canonical 은 TanStack Router route head(HeadContent)가 관리 -->

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UMC" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:title" content="UMC | 데모데이 팀 매칭 시스템" />
    <meta
      property="og:description"
      content="프로젝트 등록·조회부터 지원, 실시간 매칭 결과 확인까지 한 곳에서. UMC 데모데이 팀 매칭 시스템."
    />
    <meta property="og:url" content="https://university.neordinary.com/intro" />
    <meta
      property="og:image"
      content="https://university.neordinary.com/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="UMC 데모데이 팀 매칭 시스템" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UMC | 데모데이 팀 매칭 시스템" />
    <meta
      name="twitter:description"
      content="프로젝트 등록·조회부터 지원, 실시간 매칭 결과 확인까지 한 곳에서. UMC 데모데이 팀 매칭 시스템."
    />
    <meta
      name="twitter:image"
      content="https://university.neordinary.com/og-image.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "UMC (University MakeUs Challenge)",
            "url": "https://university.neordinary.com",
            "logo": "https://university.neordinary.com/favicon.svg"
          },
          {
            "@type": "WebSite",
            "name": "UMC 데모데이 팀 매칭 시스템",
            "url": "https://university.neordinary.com"
          }
        ]
      }
    </script>

    <script
      src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"
      async
      defer
    ></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
