<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#36D3C0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- title / description / canonical 은 TanStack Router route head(HeadContent)가 관리 -->

    <!-- Open Graph (공통값 — 페이지 가변값 og:title/description/url 은 라우트 head()가 관리) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UMC" />
    <meta property="og:locale" content="ko_KR" />
    <meta
      property="og:image"
      content="https://university.neordinary.com/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="UMC 데모데이 팀 매칭 시스템" />

    <!-- Twitter (title/description 은 og 값으로 fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://university.neordinary.com/og-image.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "UMC (University MakeUs Challenge)",
            "url": "https://university.neordinary.com",
            "logo": "https://university.neordinary.com/favicon.svg"
          },
          {
            "@type": "WebSite",
            "name": "UMC 데모데이 팀 매칭 시스템",
            "url": "https://university.neordinary.com"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
